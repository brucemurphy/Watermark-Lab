name: Release

# Trigger: push a tag like v1.2.3
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -----------------------------------------------------------------------
      # 3. Install build dependencies
      #    imageio-ffmpeg bundles a minimal ffmpeg binary (~30 MB) so no
      #    separate ffmpeg download step is needed.
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pip install pyinstaller pywin32 Pillow packaging imageio-ffmpeg

      # -----------------------------------------------------------------------
      # 4. Stamp the version into _version.py
      #    The tag is "vX.Y.Z"; strip the leading "v" for the constant.
      # -----------------------------------------------------------------------
      - name: Stamp version
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Set-Content -Path _version.py -Value "APP_VERSION = `"$version`""
        shell: pwsh

      # -----------------------------------------------------------------------
      # 6. Build the portable exe
      # -----------------------------------------------------------------------
      - name: Build with PyInstaller
        run: pyinstaller WatermarkLab.spec

      # -----------------------------------------------------------------------
      # 7. Compute SHA-256 of the output exe
      # -----------------------------------------------------------------------
      - name: Compute SHA-256
        id: sha
        run: |
          $hash = (Get-FileHash dist\WatermarkLab.exe -Algorithm SHA256).Hash.ToLower()
          echo "digest=$hash" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # -----------------------------------------------------------------------
      # 8. Write version.json
      #    The download URL points at Azure Blob — updates are served
      #    entirely from Azure. GitHub Release is for first-time installs.
      # -----------------------------------------------------------------------
      - name: Write version.json
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $sha     = "${{ steps.sha.outputs.digest }}"
          $url     = "https://watermarklab.blob.core.windows.net/releases/WatermarkLab.exe"
          $json = [ordered]@{
            version = $version
            url     = $url
            sha256  = $sha
            notes   = ""
          } | ConvertTo-Json -Compress
          Set-Content -Path version.json -Value $json
        shell: pwsh

      # -----------------------------------------------------------------------
      # 9. Upload WatermarkLab.exe + version.json to Azure Blob Storage.
      #    Both files land in the public "releases" container so the app
      #    can fetch the manifest and download the update anonymously.
      #    The connection string is assigned to a local variable first so
      #    az CLI receives it as a single quoted argument (avoids the
      #    "expected one argument" error caused by inline backtick expansion
      #    of a string containing ; and = characters).
      # -----------------------------------------------------------------------
      - name: Upload to Azure Blob
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          $cs = $env:AZURE_STORAGE_CONNECTION_STRING
          if (-not $cs) { throw "AZURE_STORAGE_CONNECTION_STRING secret is not set in this repository." }

          az storage container create --name releases --public-access blob --connection-string "$cs" --output none

          az storage blob upload --container-name releases --name WatermarkLab.exe --file dist\WatermarkLab.exe --overwrite --content-type "application/octet-stream" --connection-string "$cs"

          az storage blob upload --container-name releases --name version.json --file version.json --overwrite --content-type "application/json" --connection-string "$cs"
        shell: pwsh

      # -----------------------------------------------------------------------
      # 10. Create the GitHub Release and attach WatermarkLab.exe.
      #     This is the public-facing download page for first-time installs.
      #     Existing users are updated automatically via Azure Blob above.
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Watermark Lab ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/WatermarkLab.exe

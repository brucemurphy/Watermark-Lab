name: Release

# Trigger: push a version tag — e.g. git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out source
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -----------------------------------------------------------------------
      # 3. Install build dependencies
      #    ffmpeg is NOT bundled — the app downloads it on first use from
      #    GitHub (GyanD/codexffmpeg). No ffmpeg needed at build time.
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pip install pyinstaller pywin32 Pillow packaging python-docx

      # -----------------------------------------------------------------------
      # 4. Stamp the version — strips the leading "v" from the tag
      # -----------------------------------------------------------------------
      - name: Stamp version
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Set-Content -Path _version.py -Value "APP_VERSION = `"$version`""
        shell: pwsh

      # -----------------------------------------------------------------------
      # 5. Build the onedir folder
      # -----------------------------------------------------------------------
      - name: Build with PyInstaller
        run: pyinstaller WatermarkLab.spec

      # -----------------------------------------------------------------------
      # 6. Zip the output folder → WatermarkLab.zip
      # -----------------------------------------------------------------------
      - name: Zip output
        run: Compress-Archive -Path dist\WatermarkLab -DestinationPath dist\WatermarkLab.zip
        shell: pwsh

      # -----------------------------------------------------------------------
      # 7. Read release notes from version.json
      # -----------------------------------------------------------------------
      - name: Read release notes
        id: notes
        run: |
          $notes = (Get-Content -Raw version.json | ConvertFrom-Json).notes
          $notes = $notes -replace '\\n', "`n"
          $delimiter = "NOTES_EOF"
          echo "body<<$delimiter" >> $env:GITHUB_OUTPUT
          echo $notes >> $env:GITHUB_OUTPUT
          echo $delimiter >> $env:GITHUB_OUTPUT
        shell: pwsh

      # -----------------------------------------------------------------------
      # 8. Delete any pre-existing release for this tag so the body/notes are
      #    always regenerated fresh. action-gh-release does NOT overwrite the
      #    body of an existing release, so we remove it first. The tag itself
      #    is kept. Uses GITHUB_TOKEN which has release write permission.
      # -----------------------------------------------------------------------
      - name: Delete existing release (if any)
        run: |
          gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false 2>$null
          echo "done"
        shell: pwsh
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 9. Create GitHub Release and attach WatermarkLab.zip
      #    The in-app updater queries the GitHub Releases API at runtime to
      #    find this asset and download it automatically.
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Watermark Lab ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          files: dist/WatermarkLab.zip


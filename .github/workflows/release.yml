name: Release

# Trigger: push a version tag — e.g. git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out source
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -----------------------------------------------------------------------
      # 3. Install build dependencies
      #    ffmpeg is NOT bundled — the app downloads it on first use from
      #    GitHub (GyanD/codexffmpeg). No ffmpeg needed at build time.
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pip install pyinstaller pywin32 Pillow packaging

      # -----------------------------------------------------------------------
      # 4. Stamp the version — strips the leading "v" from the tag
      # -----------------------------------------------------------------------
      - name: Stamp version
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Set-Content -Path _version.py -Value "APP_VERSION = `"$version`""
        shell: pwsh

      # -----------------------------------------------------------------------
      # 5. Build the onedir folder
      # -----------------------------------------------------------------------
      - name: Build with PyInstaller
        run: pyinstaller WatermarkLab.spec

      # -----------------------------------------------------------------------
      # 6. Zip the output folder → WatermarkLab.zip
      # -----------------------------------------------------------------------
      - name: Zip output
        run: Compress-Archive -Path dist\WatermarkLab -DestinationPath dist\WatermarkLab.zip
        shell: pwsh

      # -----------------------------------------------------------------------
      # 7. Read release notes from version.json
      # -----------------------------------------------------------------------
      - name: Read release notes
        id: notes
        run: |
          $notes = (Get-Content version.json | ConvertFrom-Json).notes
          # Expand \n escape sequences so they become real newlines in the release body
          $notes = $notes -replace '\\n', "`n"
          echo "body=$notes" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # -----------------------------------------------------------------------
      # 8. Create GitHub Release and attach WatermarkLab.zip
      #    The in-app updater queries the GitHub Releases API at runtime to
      #    find this asset and download it automatically.
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Watermark Lab ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          files: dist/WatermarkLab.zip


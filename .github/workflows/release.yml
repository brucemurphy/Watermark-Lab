name: Release

# Trigger: push a tag like v1.2.3
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -----------------------------------------------------------------------
      # 3. Install build dependencies
      #    imageio-ffmpeg bundles a minimal ffmpeg binary (~30 MB) so no
      #    separate ffmpeg download step is needed.
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pip install pyinstaller pywin32 Pillow packaging imageio-ffmpeg

      # -----------------------------------------------------------------------
      # 4. Stamp the version into _version.py
      #    The tag is "vX.Y.Z"; strip the leading "v" for the constant.
      # -----------------------------------------------------------------------
      - name: Stamp version
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Set-Content -Path _version.py -Value "APP_VERSION = `"$version`""
        shell: pwsh

      # -----------------------------------------------------------------------
      # 6. Build the portable exe
      # -----------------------------------------------------------------------
      - name: Build with PyInstaller
        run: pyinstaller WatermarkLab.spec

      # -----------------------------------------------------------------------
      # 7. Compute SHA-256 of the output exe
      # -----------------------------------------------------------------------
      - name: Compute SHA-256
        id: sha
        run: |
          $hash = (Get-FileHash dist\WatermarkLab.exe -Algorithm SHA256).Hash.ToLower()
          echo "digest=$hash" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # -----------------------------------------------------------------------
      # 8. Build the public download URL and write version.json
      #    URL points at the GitHub Release asset so the blob just stores the
      #    manifest; the binary is served by GitHub Releases CDN.
      # -----------------------------------------------------------------------
      - name: Write version.json
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $sha     = "${{ steps.sha.outputs.digest }}"
          $url     = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/WatermarkLab.exe"
          $json = @{
            version = $version
            url     = $url
            sha256  = $sha
            notes   = ""
          } | ConvertTo-Json -Compress
          Set-Content -Path version.json -Value $json
        shell: pwsh

      # -----------------------------------------------------------------------
      # 9. Upload version.json to Azure Blob Storage
      #    az CLI is pre-installed on windows-latest runners, so we call it
      #    directly via pwsh — no Linux-only action required.
      # -----------------------------------------------------------------------
      - name: Upload version.json to Azure Blob
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          az storage container create `
            --name releases `
            --public-access blob `
            --connection-string $env:AZURE_STORAGE_CONNECTION_STRING `
            --output none
          az storage blob upload `
            --container-name releases `
            --name version.json `
            --file version.json `
            --overwrite `
            --content-type "application/json" `
            --connection-string $env:AZURE_STORAGE_CONNECTION_STRING
        shell: pwsh

      # -----------------------------------------------------------------------
      # 10. Create the GitHub Release and attach WatermarkLab.exe
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Watermark Lab ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/WatermarkLab.exe
